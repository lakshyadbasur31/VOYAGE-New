<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script>
if (localStorage.getItem("loggedIn") !== "true") {
  window.location = "login.html";
}
</script>
<div th:replace="fragments/navbar :: navbar"></div>

    <title>Select Your Guide</title>
    <style>
        body { font-family: Arial; background: #f5f5f5; }
        .card {
            background: white;
            padding: 15px;
            margin: 10px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        button {
            background: #007BFF;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    


<h1>🌍 Choose Your Travel Guide</h1>

<form method="get" action="/guides">
    <label>Place:</label>
    <select name="place">
        <option value="">All</option>
        <option value="Jaipur">Jaipur</option>
        <option value="Goa">Goa</option>
        <option value="Delhi">Delhi</option>
        <option value="Paris">Paris</option>
        <option value="Berlin">Berlin</option>
    </select>

    <label>Max Budget (₹):</label>
    <select name="budget">
        <option value="">Any</option>
        <option value="1500">1500</option>
        <option value="2000">2000</option>
        <option value="3000">3000</option>
    </select>

    <button type="submit">Search Guides</button>
</form>

<hr>

<div th:if="${guides.size() == 0}">
    <p>No guides available for selected criteria.</p>
</div>

<div th:each="guide : ${guides}" class="card">
    <h3 th:text="${guide.name}"></h3>
    <p><b>📍 Place:</b> <span th:text="${guide.place}"></span></p>
    <p><b>🌐 Languages:</b> <span th:text="${guide.language}"></span></p>
    <p><b>💰 Price per day:</b> ₹<span th:text="${guide.price}"></span></p>
    <button>Select Guide</button>
</div>

</body>
</html>
