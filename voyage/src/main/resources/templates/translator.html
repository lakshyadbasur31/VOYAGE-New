<!DOCTYPE html>
<html>
<head>
  <script>
if (localStorage.getItem("loggedIn") !== "true") {
  window.location = "login.html";
}
</script>
<div th:replace="fragments/navbar :: navbar"></div>
  <title>Voyage Translator</title>

  <style>
    :root{
      --bg:#fbd3b7;
      --card:#ffffff;
      --text:#000;
      --btn:#007bff;
    }

    body.dark{
      --bg:#121212;
      --card:#1e1e1e;
      --text:#fff;
      --btn:#0d6efd;
    }

    body{
      font-family: Arial;
       background: linear-gradient(135deg, #89f7fe, #66a6ff);
      color: var(--text);
      transition: 0.3s;
    }

    .box{
      width: 820px;
      margin: 30px auto;
      background: var(--card);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    }

    textarea{
      width: 100%;
      height: 100px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 10px;
    }

    select,button{
      margin-top: 10px;
      padding: 8px 14px;
      border-radius: 6px;
      border:none;
      cursor:pointer;
    }

    button{
      background: var(--btn);
      color:white;
    }

    .tabs button{ background:#ddd; color:#000; }
    .tabs button.active{ background:var(--btn); color:white; }

    .section{ display:none; }

    .spinner{
      display:none;
      width:30px;height:30px;
      border:4px solid #ccc;
      border-top:4px solid var(--btn);
      border-radius:50%;
      animation:spin 1s linear infinite;
      margin:10px auto;
    }

    @keyframes spin{100%{transform:rotate(360deg)}}
    ul{padding-left:20px;}
  </style>
</head>

<body>

<div class="box">
  <h2>🌍 Voyage Translator</h2>

  <button onclick="toggleDark()">🌙 Dark</button>
  <button onclick="exportHistory()">⬇ Export History</button>

  <div class="tabs">
    <button id="textTab">Text</button>
    <button id="autoTab">Auto</button>
    <button id="voiceTab">Voice</button>
  </div>

  <!-- TEXT -->
  <div id="text" class="section">
    <textarea id="textInput">This market is very busy</textarea>
    <select id="textTarget"></select>
    <button onclick="runText()">Translate</button>
    <div class="spinner" id="textSpin"></div>
    <textarea id="textOutput"></textarea>
    <button onclick="copy(textOutput)">📋 Copy</button>
    <button onclick="speak(textOutput)">🔊 Speak</button>
  </div>

  <!-- AUTO -->
  <div id="auto" class="section">
    <textarea id="autoInput"></textarea>
    <select id="autoTarget"></select>
    <p id="detected">Detected: —</p>
    <button onclick="runAuto()">Translate</button>
    <div class="spinner" id="autoSpin"></div>
    <textarea id="autoOutput"></textarea>
    <button onclick="copy(autoOutput)">📋 Copy</button>
    <button onclick="speak(autoOutput)">🔊 Speak</button>
  </div>

  <!-- VOICE -->
  <div id="voice" class="section">
    <button onclick="runVoice()">🎙 Start</button>
    <select id="voiceTarget"></select>
    <div class="spinner" id="voiceSpin"></div>
    <textarea id="voiceOutput"></textarea>
    <button onclick="copy(voiceOutput)">📋 Copy</button>
    <button onclick="speak(voiceOutput)">🔊 Speak</button>
  </div>

  <h3>🕘 History</h3>
  <ul id="history"></ul>
</div>

<script>
const LANG={
 en:"English",fr:"French",hi:"Hindi",es:"Spanish",de:"German",
 it:"Italian",pt:"Portuguese",ru:"Russian",ja:"Japanese",
 ko:"Korean",zh:"Chinese",ar:"Arabic",ta:"Tamil",te:"Telugu"
};

function fill(sel){
  for(let k in LANG){
    sel.innerHTML += `<option value="${k}">${LANG[k]}</option>`;
  }
}

fill(textTarget); fill(autoTarget); fill(voiceTarget);
textTarget.value = autoTarget.value = voiceTarget.value = "en";

/* TABS */
function show(id){
 document.querySelectorAll(".section").forEach(s=>s.style.display="none");
 document.getElementById(id).style.display="block";
 document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
 document.getElementById(id+"Tab").classList.add("active");
}
show("text");

textTab.onclick=()=>show("text");
autoTab.onclick=()=>show("auto");
voiceTab.onclick=()=>show("voice");

/* UTIL */
function copy(t){ navigator.clipboard.writeText(t.value); }
function speak(t){
  if(!t.value) return;
  speechSynthesis.speak(new SpeechSynthesisUtterance(t.value));
}
function addHist(i,o){
 const h=document.getElementById("history");
 const li=document.createElement("li");
 li.textContent=i+" → "+o;
 h.prepend(li);
 if(h.children.length>5)h.lastChild.remove();
}
function toggleDark(){ document.body.classList.toggle("dark"); }

function exportHistory(){
 let txt=[...history.children].map(li=>li.textContent).join("\n");
 const a=document.createElement("a");
 a.href=URL.createObjectURL(new Blob([txt]));
 a.download="history.txt";
 a.click();
}

/* TEXT */
async function runText(){
 textSpin.style.display="block";
 const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(textInput.value)}&langpair=en|${textTarget.value}`);
 const j=await r.json();
 textOutput.value=j.responseData.translatedText;
 addHist(textInput.value,textOutput.value);
 textSpin.style.display="none";
}

/* AUTO */
async function runAuto(){
 autoSpin.style.display="block";
 let t=autoInput.value, src="en";

 if(/[\u0900-\u097F]/.test(t))src="hi";
 else if(/[\u0B80-\u0BFF]/.test(t))src="ta";
 else if(/[\u0C00-\u0C7F]/.test(t))src="te";
 else if(/[\u3040-\u30FF]/.test(t))src="ja";
 else if(/[\uAC00-\uD7AF]/.test(t))src="ko";
 else if(/[\u4E00-\u9FFF]/.test(t))src="zh";
 else if(/[àâçéèê]/i.test(t))src="fr";
 else if(/[áéíóúñ]/i.test(t))src="es";

 detected.innerText="Detected: "+src.toUpperCase();

 const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(t)}&langpair=${src}|${autoTarget.value}`);
 const j=await r.json();
 autoOutput.value=j.responseData.translatedText;
 addHist(t,autoOutput.value);
 autoSpin.style.display="none";
}

/* VOICE */
function runVoice(){
 const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
 if(!SR){ alert("Speech recognition not supported"); return; }

 const rec=new SR();
 rec.lang=navigator.language;
 voiceSpin.style.display="block";
 rec.start();

 rec.onresult=async e=>{
  const s=e.results[0][0].transcript;
  const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(s)}&langpair=en|${voiceTarget.value}`);
  const j=await r.json();
  voiceOutput.value=j.responseData.translatedText;
  addHist(s,voiceOutput.value);
  voiceSpin.style.display="none";
 };
}
</script>

</body>
</html>
